<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NelShop Checkout - Secure checkout with delivery to Asaba, Okpanam, Koka. Pay on Delivery.">
    <title>Checkout | NelShop - Asaba, Delta State</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: { 50: '#f7f7f7', 100: '#e3e3e3', 200: '#c8c8c8', 300: '#a4a4a4', 400: '#818181', 500: '#666666', 600: '#515151', 700: '#434343', 800: '#383838', 900: '#1a1a1a', 950: '#0f0f0f' },
                        accent: { DEFAULT: '#2563eb', hover: '#1d4ed8', light: '#3b82f6' }
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif'] },
                    boxShadow: { soft: '0 8px 30px rgb(0,0,0,0.04)', glass: '0 8px 32px 0 rgba(31, 38, 135, 0.07)' }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="font-sans antialiased bg-slate-50 text-charcoal-900">
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold">Nel<span class="text-accent">Shop</span></a>
            <div class="flex items-center gap-4">
                <span class="text-sm text-charcoal-500">Checkout</span>
                <a href="index.html" class="text-sm text-accent font-medium">← Continue Shopping</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Empty cart redirect -->
        <div id="emptyCart" class="hidden text-center py-20">
            <p class="text-charcoal-500 text-lg">Your cart is empty.</p>
            <a href="index.html" class="mt-4 inline-block text-accent font-medium">← Back to Shop</a>
        </div>

        <div id="checkoutContent" class="flex flex-col lg:flex-row gap-8">
            <!-- Steps Form -->
            <div class="flex-1">
                <!-- Step indicator -->
                <div class="flex items-center gap-2 mb-8">
                    <div class="step-dot flex items-center justify-center w-8 h-8 rounded-full bg-accent text-white text-sm font-medium" data-step="1">1</div>
                    <div class="flex-1 h-0.5 bg-slate-200"></div>
                    <div class="step-dot flex items-center justify-center w-8 h-8 rounded-full bg-slate-200 text-charcoal-500 text-sm font-medium" data-step="2">2</div>
                    <div class="flex-1 h-0.5 bg-slate-200"></div>
                    <div class="step-dot flex items-center justify-center w-8 h-8 rounded-full bg-slate-200 text-charcoal-500 text-sm font-medium" data-step="3">3</div>
                </div>

                <!-- Step 1: Shipping -->
                <div id="step1" class="step-panel rounded-2xl border border-slate-100 bg-white/80 backdrop-blur p-6 md:p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                    <h2 class="text-xl font-bold text-charcoal-900 mb-6">Shipping Details</h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-charcoal-700 mb-1">First Name</label>
                                <input type="text" id="firstName" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-charcoal-700 mb-1">Last Name</label>
                                <input type="text" id="lastName" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-charcoal-700 mb-1">Phone</label>
                            <input type="tel" id="phone" required placeholder="e.g. 08012345678" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-charcoal-700 mb-1">Delivery Zone (Asaba)</label>
                            <select id="deliveryZone" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none">
                                <option value="">Select your area</option>
                                <option value="summit">Summit Road</option>
                                <option value="nnebisi">Nnebisi Road</option>
                                <option value="gra">GRA</option>
                                <option value="ogbogonogo">Ogbogonogo</option>
                                <option value="okpanam">Okpanam</option>
                                <option value="koka">Koka</option>
                                <option value="dbs">DBS Road</option>
                                <option value="other">Other (specify in address)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-charcoal-700 mb-1">Full Address</label>
                            <textarea id="address" rows="3" required placeholder="Street, landmark, building..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none resize-none"></textarea>
                        </div>
                    </div>
                    <button type="button" id="nextToPayment" class="mt-6 w-full md:w-auto px-8 py-3 rounded-xl bg-accent text-white font-medium hover:bg-accent-hover transition-colors">Continue to Payment</button>
                </div>

                <!-- Step 2: Payment -->
                <div id="step2" class="step-panel hidden rounded-2xl border border-slate-100 bg-white/80 backdrop-blur p-6 md:p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                    <h2 class="text-xl font-bold text-charcoal-900 mb-6">Payment Method</h2>
                    <div class="space-y-4">
                        <label class="flex items-center gap-4 p-4 rounded-xl border-2 border-accent bg-accent/5 cursor-pointer">
                            <input type="radio" name="payment" value="pod" checked class="accent-accent">
                            <div>
                                <span class="font-medium">Pay on Delivery</span>
                                <p class="text-sm text-charcoal-500">Pay with cash or card when you receive your order</p>
                            </div>
                        </label>
                        <label class="flex items-center gap-4 p-4 rounded-xl border-2 border-slate-200 hover:border-slate-300 cursor-pointer">
                            <input type="radio" name="payment" value="transfer" class="accent-accent">
                            <div>
                                <span class="font-medium">Bank Transfer</span>
                                <p class="text-sm text-charcoal-500">Transfer to our account before delivery</p>
                            </div>
                        </label>
                    </div>
                    <div class="flex gap-4 mt-6">
                        <button type="button" id="backToShipping" class="px-6 py-3 rounded-xl border border-slate-200 font-medium hover:bg-slate-50 transition-colors">Back</button>
                        <button type="button" id="nextToReview" class="px-8 py-3 rounded-xl bg-accent text-white font-medium hover:bg-accent-hover transition-colors">Continue to Review</button>
                    </div>
                </div>

                <!-- Step 3: Review -->
                <div id="step3" class="step-panel hidden rounded-2xl border border-slate-100 bg-white/80 backdrop-blur p-6 md:p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                    <h2 class="text-xl font-bold text-charcoal-900 mb-6">Review Order</h2>
                    <div id="reviewShipping" class="mb-6 p-4 rounded-xl bg-slate-50 text-sm"></div>
                    <div id="reviewPayment" class="mb-6 p-4 rounded-xl bg-slate-50 text-sm"></div>
                    <div class="flex gap-4">
                        <button type="button" id="backToPayment" class="px-6 py-3 rounded-xl border border-slate-200 font-medium hover:bg-slate-50 transition-colors">Back</button>
                        <button type="button" id="placeOrder" class="px-8 py-3 rounded-xl bg-accent text-white font-medium hover:bg-accent-hover transition-colors">Place Order</button>
                    </div>
                </div>
            </div>

            <!-- Sticky Order Summary Sidebar -->
            <div class="lg:w-96 shrink-0">
                <div class="sticky top-24 rounded-2xl border border-slate-100 bg-white/80 backdrop-blur p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                    <h3 class="font-bold text-charcoal-900 mb-4">Order Summary</h3>
                    <div id="orderItems" class="space-y-3 max-h-64 overflow-y-auto mb-4"></div>
                    <div class="space-y-2 border-t border-slate-200 pt-4">
                        <div class="flex justify-between text-sm"><span class="text-charcoal-500">Subtotal</span><span id="summarySubtotal">₦0</span></div>
                        <div class="flex justify-between text-sm"><span class="text-charcoal-500">Delivery</span><span id="summaryDelivery">₦0</span></div>
                        <div class="flex justify-between font-semibold text-lg"><span>Total</span><span id="summaryTotal">₦0</span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/product-sync.js"></script>
    <script src="assets/js/store.js"></script>
    <script src="assets/js/checkout.js"></script>
</body>
</html>
