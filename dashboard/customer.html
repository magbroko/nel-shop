<!DOCTYPE html>
<html lang="en-NG" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | NelShop Customer Dashboard</title>
    <script>
      (function(){var t=localStorage.getItem('nelshop-customer-theme');if(t==='light'){document.documentElement.classList.remove('dark');document.documentElement.classList.add('light');}})();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        charcoal: { 50: '#f7f7f7', 100: '#e3e3e3', 900: '#1a1a1a' },
                        accent: { DEFAULT: '#6366f1', hover: '#4f46e5' },
                        brand: { DEFAULT: '#6366f1', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' }
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'Fira Code', 'ui-monospace', 'monospace'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen">
    <div class="min-h-screen flex flex-col lg:flex-row">
        <!-- Mobile header -->
        <header class="lg:hidden sticky top-0 z-20 bg-slate-900/90 backdrop-blur-xl border-b border-white/10 px-4 py-3 flex items-center justify-between">
            <a href="../index.html" class="text-xl font-bold">Nel<span class="text-indigo-400">Shop</span></a>
            <div class="flex items-center gap-2">
                <button type="button" id="themeToggleMobile" class="theme-toggle p-2 rounded-lg hover:bg-white/10 transition-all duration-300 ease-in-out" aria-label="Toggle light/dark theme">
                    <span class="theme-icon-dark"><svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg></span>
                    <span class="theme-icon-light hidden"><svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg></span>
                </button>
                <button type="button" id="navToggle" class="p-2 rounded-lg hover:bg-white/10 transition-colors" aria-label="Toggle menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            </div>
        </header>

        <!-- Left navigation -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-30 w-64 bg-gradient-to-b from-slate-900 to-slate-800 border-r border-white/5 transform -translate-x-full lg:translate-x-0 transition-transform duration-200 flex flex-col">
            <div class="p-6 border-b border-white/10 hidden lg:block">
                <div class="flex items-center justify-between gap-3">
                    <div>
                        <a href="../index.html" class="text-xl font-bold">Nel<span class="text-indigo-400">Shop</span></a>
                        <p class="text-slate-400 text-sm mt-1">My Account</p>
                    </div>
                    <button type="button" id="themeToggle" class="theme-toggle flex-shrink-0 p-2 rounded-xl border border-white/10 hover:border-white/20 transition-all duration-300 ease-in-out" aria-label="Toggle light/dark theme">
                        <span class="theme-icon-dark" aria-hidden="true">
                            <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        </span>
                        <span class="theme-icon-light hidden" aria-hidden="true">
                            <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                        </span>
                    </button>
                </div>
            </div>
            <nav class="customer-nav flex-1 pl-0 pr-4 py-5 space-y-1 overflow-y-auto">
                <a href="#" data-view="orders" class="nav-link nav-link-active flex items-center gap-3 pl-4 py-3.5 rounded-r-xl text-white relative transition-all duration-300 ease-out">
                    <span class="nav-indicator absolute left-0 top-0 bottom-0 w-1 rounded-r"></span>
                    <svg class="w-5 h-5 nav-icon flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    My Orders
                </a>
                <a href="#" data-view="wishlist" class="nav-link flex items-center gap-3 pl-4 py-3.5 rounded-r-xl text-slate-400 hover:bg-white/5 hover:text-white relative transition-all duration-300 ease-out">
                    <svg class="w-5 h-5 nav-icon flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    Wishlist
                </a>
                <a href="#" data-view="track" class="nav-link flex items-center gap-3 pl-4 py-3.5 rounded-r-xl text-slate-400 hover:bg-white/5 hover:text-white relative transition-all duration-300 ease-out">
                    <svg class="w-5 h-5 nav-icon flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Track Shipment
                </a>
                <a href="#" data-view="profile" class="nav-link flex items-center gap-3 pl-4 py-3.5 rounded-r-xl text-slate-400 hover:bg-white/5 hover:text-white relative transition-all duration-300 ease-out">
                    <svg class="w-5 h-5 nav-icon flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Profile Settings
                </a>
            </nav>
            <div class="p-4 border-t border-white/10">
                <a href="../index.html" class="flex items-center gap-2 text-slate-400 hover:text-indigo-400 text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back to Store
                </a>
            </div>
        </aside>

        <div id="navOverlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-20 lg:hidden opacity-0 pointer-events-none transition-opacity" aria-hidden="true"></div>

        <!-- Main content -->
        <main id="mainContent" class="flex-1 p-4 md:p-6 lg:p-8 min-w-0 relative overflow-hidden">
            <div class="customer-glass relative rounded-2xl p-6 md:p-8 min-h-[calc(100vh-2rem)] overflow-hidden" id="customerGlassContainer">
                <div id="cursorSpotlight" class="customer-spotlight" aria-hidden="true"></div>
                <div class="relative z-10">
                <p id="welcome-text" class="text-lg text-slate-400 mb-6 font-medium">
                    Welcome back, <span id="user-name" class="font-bold text-indigo-400">Valued Guest</span>!
                </p>
                <!-- My Orders (default) -->
                <div id="view-orders" class="view-panel relative">
                    <h2 class="customer-section-title text-6xl md:text-7xl lg:text-8xl font-extrabold text-white/20 tracking-tighter select-none pointer-events-none mb-2 -mt-4">My Orders</h2>
                    <div class="space-y-4 md:space-y-6 -mt-16 md:-mt-20 pt-20 md:pt-24" id="ordersList">
                        <!-- Populated by customer.js -->
                    </div>
                </div>

            <!-- Wishlist -->
            <div id="view-wishlist" class="view-panel hidden">
                <h2 class="customer-section-title text-5xl md:text-6xl font-extrabold text-white/20 tracking-tighter mb-6">Wishlist</h2>
                <div id="wishlistContent" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Populated by customer.js -->
                </div>
            </div>

            <!-- Track Shipment -->
            <div id="view-track" class="view-panel hidden">
                <h2 class="customer-section-title text-5xl md:text-6xl font-extrabold text-white/20 tracking-tighter mb-6">Track Shipment</h2>
                <div class="customer-glass rounded-xl p-6 border border-white/10">
                    <label for="trackingInput" class="block text-sm font-medium text-slate-300 mb-2">Enter tracking number</label>
                    <div class="flex gap-2">
                        <input type="text" id="trackingInput" placeholder="e.g. NLS-123456" class="flex-1 px-4 py-2.5 rounded-xl border border-white/10 bg-white/5 text-slate-100 focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 outline-none placeholder-slate-500">
                        <button type="button" id="trackBtn" class="px-4 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-500 transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]">Track</button>
                    </div>
                    <div id="trackResult" class="mt-6 hidden"></div>
                </div>
            </div>

            <!-- Profile Settings -->
            <div id="view-profile" class="view-panel hidden">
                <h2 class="customer-section-title text-5xl md:text-6xl font-extrabold text-white/20 tracking-tighter mb-6">Profile Settings</h2>
                <div class="customer-glass rounded-xl p-6 max-w-xl border border-white/10">
                    <p class="text-slate-400">Manage your account details, delivery address, and preferences.</p>
                    <div class="mt-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Full Name</label>
                            <input type="text" value="Customer Name" class="w-full px-4 py-2 rounded-xl border border-white/10 bg-white/5 text-slate-100 focus:ring-2 focus:ring-indigo-500/50 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                            <input type="email" value="customer@example.com" class="w-full px-4 py-2 rounded-xl border border-white/10 bg-white/5 text-slate-100 focus:ring-2 focus:ring-indigo-500/50 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Phone</label>
                            <input type="tel" value="+234 800 000 0000" class="w-full px-4 py-2 rounded-xl border border-white/10 bg-white/5 text-slate-100 focus:ring-2 focus:ring-indigo-500/50 outline-none">
                        </div>
                        <button type="button" class="px-6 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-500 transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]">Save Changes</button>
                    </div>
                </div>
            </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/store.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const userName = localStorage.getItem('currentUser') || 'Valued Guest';
        const nameEl = document.getElementById('user-name');
        if (nameEl) nameEl.textContent = userName;
      });
    </script>
    <script src="../assets/js/customer.js"></script>
</body>
</html>
