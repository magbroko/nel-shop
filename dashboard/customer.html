<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | NelShop Customer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: { 50: '#f7f7f7', 100: '#e3e3e3', 900: '#1a1a1a' },
                        accent: { DEFAULT: '#2563eb', hover: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <div class="min-h-screen flex flex-col lg:flex-row">
        <!-- Mobile header -->
        <header class="lg:hidden sticky top-0 z-20 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
            <a href="../index.html" class="text-xl font-bold">Nel<span class="text-blue-600">Shop</span></a>
            <button type="button" id="navToggle" class="p-2 rounded-lg hover:bg-gray-100" aria-label="Toggle menu">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </header>

        <!-- Left navigation -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-30 w-64 bg-white border-r border-gray-200 transform -translate-x-full lg:translate-x-0 transition-transform duration-200 flex flex-col">
            <div class="p-6 border-b border-gray-200 hidden lg:block">
                <a href="../index.html" class="text-xl font-bold">Nel<span class="text-blue-600">Shop</span></a>
                <p class="text-gray-500 text-sm mt-1">My Account</p>
            </div>
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <a href="#" data-view="orders" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-100 text-blue-700 font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    My Orders
                </a>
                <a href="#" data-view="wishlist" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    Wishlist
                </a>
                <a href="#" data-view="track" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Track Shipment
                </a>
                <a href="#" data-view="profile" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-100 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Profile Settings
                </a>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <a href="../index.html" class="flex items-center gap-2 text-gray-500 hover:text-blue-600 text-sm transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back to Store
                </a>
            </div>
        </aside>

        <div id="navOverlay" class="fixed inset-0 bg-gray-900/50 z-20 lg:hidden opacity-0 pointer-events-none transition-opacity" aria-hidden="true"></div>

        <!-- Main content -->
        <main class="flex-1 p-4 md:p-6 lg:p-8 min-w-0">
            <!-- My Orders (default) -->
            <div id="view-orders" class="view-panel">
                <h2 class="text-xl font-bold text-gray-800 mb-6">My Orders</h2>
                <div class="space-y-4 md:space-y-6" id="ordersList">
                    <!-- Populated by customer.js -->
                </div>
            </div>

            <!-- Wishlist -->
            <div id="view-wishlist" class="view-panel hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-6">Wishlist</h2>
                <div id="wishlistContent" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Populated by customer.js -->
                </div>
            </div>

            <!-- Track Shipment -->
            <div id="view-track" class="view-panel hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-6">Track Shipment</h2>
                <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
                    <label for="trackingInput" class="block text-sm font-medium text-gray-700 mb-2">Enter tracking number</label>
                    <div class="flex gap-2">
                        <input type="text" id="trackingInput" placeholder="e.g. NLS-123456" class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        <button type="button" id="trackBtn" class="px-4 py-2.5 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 transition-colors">Track</button>
                    </div>
                    <div id="trackResult" class="mt-6 hidden"></div>
                </div>
            </div>

            <!-- Profile Settings -->
            <div id="view-profile" class="view-panel hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-6">Profile Settings</h2>
                <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm max-w-xl">
                    <p class="text-gray-600">Manage your account details, delivery address, and preferences.</p>
                    <div class="mt-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                            <input type="text" value="Customer Name" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" value="customer@example.com" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                            <input type="tel" value="+234 800 000 0000" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <button type="button" class="px-6 py-2.5 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 transition-colors">Save Changes</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/store.js"></script>
    <script src="../assets/js/customer.js"></script>
</body>
</html>
