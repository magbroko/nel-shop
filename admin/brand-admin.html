<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Admin | NelShop Vendor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: { 50: '#f7f7f7', 100: '#e3e3e3', 900: '#1a1a1a' },
                        accent: { DEFAULT: '#2563eb', hover: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <!-- Top Navigation -->
    <header class="sticky top-0 z-30 bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-4">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-emerald-100 flex items-center justify-center overflow-hidden shrink-0">
                        <span class="text-emerald-600 font-bold text-lg">DT</span>
                    </div>
                    <div>
                        <h1 class="font-bold text-slate-800">Delta Threads</h1>
                        <p class="text-slate-500 text-sm">Brand Dashboard</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <a href="../index.html" class="px-4 py-2 rounded-xl text-slate-600 hover:bg-slate-100 text-sm font-medium transition-colors hidden sm:inline">View Store</a>
                    <a href="add-product.html" class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-emerald-600 text-white font-medium hover:bg-emerald-700 transition-colors shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Add New Product
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-6 md:py-8">
        <!-- Add Product Form -->
        <section class="mb-8 md:mb-12">
            <h2 class="text-xl font-bold text-slate-800 mb-4 md:mb-6">Add Product</h2>
            <form id="addProductForm" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <label for="syncProductName" class="block text-sm font-medium text-slate-700 mb-1">Product Name <span class="text-red-500">*</span></label>
                        <input type="text" id="syncProductName" required placeholder="e.g. Wireless Earbuds" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div>
                        <label for="syncPrice" class="block text-sm font-medium text-slate-700 mb-1">Price (₦) <span class="text-red-500">*</span></label>
                        <input type="number" id="syncPrice" required min="0" placeholder="e.g. 25000" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div>
                        <label for="syncCategory" class="block text-sm font-medium text-slate-700 mb-1">Category <span class="text-red-500">*</span></label>
                        <select id="syncCategory" required class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                            <option value="electronics">Electronics</option>
                            <option value="fashion">Fashion</option>
                            <option value="groceries">Groceries</option>
                            <option value="local">Local Specialties</option>
                        </select>
                    </div>
                    <div>
                        <label for="syncImageUrl" class="block text-sm font-medium text-slate-700 mb-1">Image URL</label>
                        <input type="url" id="syncImageUrl" placeholder="https://..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                </div>
                <input type="hidden" id="syncBrandName" value="">
                <div class="mt-4">
                    <button type="submit" class="px-6 py-2.5 rounded-xl bg-emerald-600 text-white font-medium hover:bg-emerald-700 transition-colors">
                        Add Product
                    </button>
                </div>
            </form>
        </section>

        <!-- My Products Table -->
        <section class="mb-8 md:mb-12">
            <h2 class="text-xl font-bold text-slate-800 mb-4 md:mb-6">My Products</h2>
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Product</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Price</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Category</th>
                                <th class="px-6 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Status</th>
                            </tr>
                        </thead>
                        <tbody id="myProductsTable" class="divide-y divide-slate-200">
                            <!-- Populated by vendor.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
            <!-- Sales Performance -->
            <section class="lg:col-span-2">
                <h2 class="text-xl font-bold text-slate-800 mb-4 md:mb-6">Sales Performance</h2>
                <div class="bg-white rounded-xl border border-slate-200 p-6 md:p-8 shadow-sm">
                    <div class="relative h-64 md:h-80 flex items-center justify-center bg-slate-50 rounded-xl border-2 border-dashed border-slate-200">
                        <div class="text-center text-slate-500">
                            <svg class="w-16 h-16 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>
                            <p class="font-medium">Chart placeholder</p>
                            <p class="text-sm mt-1">Connect your analytics to display sales data</p>
                        </div>
                    </div>
                    <div class="mt-4 flex flex-wrap gap-4">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                            <span class="text-sm text-slate-600">Revenue</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full bg-amber-500"></span>
                            <span class="text-sm text-slate-600">Orders</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Recent Orders -->
            <section>
                <h2 class="text-xl font-bold text-slate-800 mb-4 md:mb-6">Recent Orders</h2>
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto max-h-80 overflow-y-auto">
                        <table class="w-full">
                            <thead class="bg-slate-50 sticky top-0">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Order</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Amount</th>
                                    <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600 uppercase">Status</th>
                                </tr>
                            </thead>
                            <tbody id="recentOrdersTable" class="divide-y divide-slate-200">
                                <!-- Populated by vendor.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../assets/js/product-sync.js"></script>
    <script src="../assets/js/store.js"></script>
    <script src="../assets/js/vendor.js"></script>
</body>
</html>
