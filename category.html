<!DOCTYPE html>
<html lang="en-NG">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NelShop - Shop by category. Electronics, Fashion, Groceries, Local Specialties. Same-day delivery to Asaba, Okpanam, Koka.">
    <title>Category | NelShop - Asaba, Delta State</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: { 50: '#f7f7f7', 100: '#e3e3e3', 200: '#c8c8c8', 300: '#a4a4a4', 400: '#818181', 500: '#666666', 600: '#515151', 700: '#434343', 800: '#383838', 900: '#1a1a1a', 950: '#0f0f0f' },
                        accent: { DEFAULT: '#2563eb', hover: '#1d4ed8', light: '#3b82f6' }
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif'] },
                    boxShadow: { soft: '0 8px 30px rgb(0,0,0,0.04)', glass: '0 8px 32px 0 rgba(31, 38, 135, 0.07)' }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="font-sans antialiased bg-slate-50 text-charcoal-900">
    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-slate-100 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
        <div class="bg-charcoal-900 text-white py-2 px-4 text-sm">
            <div class="max-w-7xl mx-auto">Delivering to <strong>Asaba</strong> • Okpanam, Koka | Pay on Delivery | Same-Day</div>
        </div>
        <nav class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold">Nel<span class="text-accent">Shop</span></a>
            <div class="flex items-center gap-4">
                <a href="category.html?category=electronics" class="hidden md:inline text-sm font-medium hover:text-accent">Electronics</a>
                <a href="category.html?category=fashion" class="hidden md:inline text-sm font-medium hover:text-accent">Fashion</a>
                <a href="category.html?category=groceries" class="hidden md:inline text-sm font-medium hover:text-accent">Groceries</a>
                <a href="category.html?category=local" class="hidden md:inline text-sm font-medium hover:text-accent">Local</a>
                <a href="checkout.html" class="relative flex items-center gap-2 px-4 py-2 rounded-xl bg-accent text-white text-sm font-medium" id="cartBtn">
                    Cart <span class="cart-count-badge">0</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Filter Sidebar (Glassmorphism) -->
            <aside class="lg:w-64 shrink-0">
                <div class="sticky top-24 rounded-2xl border border-slate-100 bg-white/80 backdrop-blur p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                    <h3 class="font-semibold text-charcoal-900 mb-4">Filters</h3>

                    <!-- Price Range -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-charcoal-700 mb-2">Price Range</label>
                        <div class="flex items-center gap-2 text-sm text-charcoal-500">
                            <span id="priceMinDisplay">₦0</span>
                            <span>–</span>
                            <span id="priceMaxDisplay">₦50,000</span>
                        </div>
                        <input type="range" id="priceMin" min="0" max="50000" value="0" step="1000" class="w-full mt-2 accent-accent">
                        <input type="range" id="priceMax" min="0" max="50000" value="50000" step="1000" class="w-full mt-1 accent-accent">
                    </div>

                    <!-- Brand -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-charcoal-700 mb-2">Brand</label>
                        <div class="space-y-2 max-h-32 overflow-y-auto" id="brandFilters"></div>
                    </div>

                    <!-- Condition -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-charcoal-700 mb-2">Condition</label>
                        <div class="space-y-2" id="conditionFilters"></div>
                    </div>

                    <!-- Asaba Express -->
                    <div class="mb-6">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="asabaExpressFilter" class="rounded accent-accent">
                            <span class="text-sm font-medium">Asaba Express (2hr delivery)</span>
                        </label>
                    </div>

                    <button type="button" id="clearFilters" class="w-full py-2 rounded-xl border border-slate-200 text-sm font-medium hover:bg-slate-50 transition-colors">
                        Clear Filters
                    </button>
                </div>
            </aside>

            <!-- Products Grid -->
            <div class="flex-1 min-w-0">
                <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                    <h1 id="categoryTitle" class="text-2xl font-bold text-charcoal-900">All Products</h1>
                    <p id="resultsCount" class="text-charcoal-500 text-sm">0 products</p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="productGrid"></div>
                <div id="noResults" class="hidden text-center py-16 text-charcoal-500">
                    <p class="text-lg">No products match your filters.</p>
                    <button type="button" id="resetFiltersBtn" class="mt-4 text-accent font-medium">Reset filters</button>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/store.js"></script>
    <script src="assets/js/category.js"></script>
</body>
</html>
